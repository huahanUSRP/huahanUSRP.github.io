# Basic site settings
title: "Huahan Notes"
email: "lu.huahan@gmail"
description: "Personal application notes and research notes."
url: "https://huahanUSRP.github.io"
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"
search: true

# Build settings
markdown: kramdown
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: "Asia/Singapore"

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Author (simple version)
author:
  name: "Huahan"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Wireless Researcher | MATLAB | USRP | Notes"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
